name: Build NS Proxy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ns_proxy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          python3 tools/generate_icons.py
          dart run flutter_launcher_icons

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-proxy-android
          path: ns_proxy/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ns_proxy
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          python tools/generate_icons.py
          dart run flutter_launcher_icons

      - name: Build Windows release
        run: flutter build windows --release

      - name: Download Xray for Windows
        shell: pwsh
        run: |
          $xrayVersion = "25.6.8"
          $zipUrl = "https://github.com/XTLS/Xray-core/releases/download/v${xrayVersion}/Xray-windows-64.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile xray.zip
          Expand-Archive -Path xray.zip -DestinationPath xray-temp -Force
          New-Item -ItemType Directory -Force -Path build/windows-package/xray | Out-Null
          Copy-Item xray-temp/xray.exe build/windows-package/xray/xray.exe

      - name: Package Windows release
        shell: pwsh
        run: |
          $out = "build/windows-package"
          Copy-Item -Recurse build/windows/x64/runner/Release/* $out/
          Compress-Archive -Path "$out/*" -DestinationPath build/ns-proxy-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-proxy-windows
          path: ns_proxy/build/ns-proxy-windows.zip

  release:
    name: Publish GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NS Proxy ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ns-proxy-android/app-release.apk
            artifacts/ns-proxy-windows/ns-proxy-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
