name: Build NS Proxy Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ns_proxy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ns-proxy-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-proxy-android
          path: ns_proxy/build/app/outputs/flutter-apk/ns-proxy-android.apk

  build-windows:
    name: Windows
    runs-on: windows-2022
    defaults:
      run:
        working-directory: ns_proxy
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Download Xray for Windows
        shell: pwsh
        run: |
          $xrayVersion = "25.6.8"
          $zipUrl = "https://github.com/XTLS/Xray-core/releases/download/v${xrayVersion}/Xray-windows-64.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile xray.zip
          Expand-Archive -Path xray.zip -DestinationPath xray-temp -Force
          New-Item -ItemType Directory -Force -Path build/windows-package/xray | Out-Null
          Copy-Item xray-temp/xray.exe build/windows-package/xray/xray.exe

      - name: Package Windows release
        shell: pwsh
        run: |
          $out = "build/windows-package"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item -Recurse build/windows/x64/runner/Release/* $out/
          Compress-Archive -Path "$out/*" -DestinationPath build/ns-proxy-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-proxy-windows
          path: ns_proxy/build/ns-proxy-windows.zip

  release:
    name: Publish GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NS Proxy ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## NS Proxy ${{ github.ref_name }}

            VPN-клиент для VLESS ключей.

            ### Скачать
            | Файл | Платформа |
            |------|-----------|
            | `ns-proxy-android.apk` | Android |
            | `ns-proxy-windows.zip` | Windows (ПК) |

            ### Установка Android
            1. Скачайте APK
            2. Разрешите установку из неизвестных источников
            3. Установите и разрешите VPN при подключении

            ### Установка Windows
            1. Распакуйте ZIP
            2. Запустите `ns_proxy.exe`
            3. Для VPN может потребоваться запуск от имени администратора
          files: |
            artifacts/ns-proxy-android/ns-proxy-android.apk
            artifacts/ns-proxy-windows/ns-proxy-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
